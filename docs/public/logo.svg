<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" width="480" height="120">
  <defs>
    <linearGradient id="vt-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0F766E"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
  </defs>
  <title>vidtrace</title>
  <!-- film strip frame, sprocket holes inside -->
  <g transform="translate(10,10)">
    <rect x="0" y="0" width="100" height="100" rx="6" fill="#F1F5F9" stroke="url(#vt-grad)" stroke-width="2"/>
    <rect x="0" y="6" width="6" height="6" fill="url(#vt-grad)"/>
    <rect x="0" y="20" width="6" height="6" fill="url(#vt-grad)"/>
    <rect x="0" y="34" width="6" height="6" fill="url(#vt-grad)"/>
    <rect x="0" y="48" width="6" height="6" fill="url(#vt-grad)"/>
    <rect x="0" y="62" width="6" height="6" fill="url(#vt-grad)"/>
    <rect x="0" y="76" width="6" height="6" fill="url(#vt-grad)"/>
    <rect x="0" y="88" width="6" height="6" fill="url(#vt-grad)"/>
    <rect x="94" y="6" width="6" height="6" fill="url(#vt-grad)"/>
    <rect x="94" y="20" width="6" height="6" fill="url(#vt-grad)"/>
    <rect x="94" y="34" width="6" height="6" fill="url(#vt-grad)"/>
    <rect x="94" y="48" width="6" height="6" fill="url(#vt-grad)"/>
    <rect x="94" y="62" width="6" height="6" fill="url(#vt-grad)"/>
    <rect x="94" y="76" width="6" height="6" fill="url(#vt-grad)"/>
    <rect x="94" y="88" width="6" height="6" fill="url(#vt-grad)"/>
    <!-- play triangle inside frame -->
    <polygon points="38,32 38,68 70,50" fill="url(#vt-grad)"/>
  </g>
  <!-- wordmark -->
  <g font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-weight="700" font-size="56" letter-spacing="-2">
    <text x="135" y="76" fill="#0F172A">vidtrace</text>
  </g>
</svg>
