version: 2

project_name: vidtrace

before:
  hooks:
    - go mod tidy

builds:
  - id: vidtrace
    main: ./cmd/vidtrace
    binary: vidtrace
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
    mod_timestamp: "{{ .CommitTimestamp }}"

notarize:
  macos:
    # Enabled only when the signing secret is present, so local and fork builds
    # (and any build missing the secrets) still succeed unsigned. GoReleaser uses
    # the bundled quill, so no external signing tool is required on the runner.
    - enabled: '{{ isEnvSet "MACOS_SIGN_P12" }}'
      ids:
        - vidtrace
      sign:
        certificate: "{{ .Env.MACOS_SIGN_P12 }}"
        password: "{{ .Env.MACOS_SIGN_PASSWORD }}"
      notarize:
        issuer_id: "{{ .Env.APPLE_API_ISSUER_ID }}"
        key_id: "{{ .Env.APPLE_API_KEY_ID }}"
        key: "{{ .Env.NOTARY_KEY_B64 }}"
        wait: true
        timeout: 20m

archives:
  - id: vidtrace
    ids:
      - vidtrace
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md

nfpms:
  - id: vidtrace
    ids:
      - vidtrace
    package_name: vidtrace
    vendor: Abdul Hamid Achik
    homepage: "https://github.com/abdul-hamid-achik/vidtrace"
    maintainer: "Abdul Hamid Achik <abdulachik@icloud.com>"
    description: "Turn bug videos into timestamped evidence bundles for humans and coding agents"
    license: MIT
    formats:
      - deb
      - rpm
    bindir: /usr/bin
    section: utils
    # ffmpeg, ffprobe, tesseract, and whisper are runtime tools checked by
    # `vidtrace doctor`; they are not declared as hard package dependencies
    # because their package names differ across distributions and whisper is
    # installed via pip rather than a system package.

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

release:
  github:
    owner: abdul-hamid-achik
    name: vidtrace
  draft: false
  prerelease: auto
  name_template: "v{{ .Version }}"

homebrew_casks:
  - name: vidtrace
    ids:
      - vidtrace
    binaries:
      - vidtrace
    repository:
      owner: abdul-hamid-achik
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Casks
    homepage: "https://github.com/abdul-hamid-achik/vidtrace"
    description: "Turn bug videos into timestamped evidence bundles for humans and coding agents"
    license: "MIT"
    skip_upload: "{{ if .Env.HOMEBREW_TAP_TOKEN }}false{{ else }}true{{ end }}"
    caveats: |
      The binary is signed with a Developer ID certificate and notarized by Apple.

      Run `vidtrace doctor` after installation to check ffmpeg, ffprobe, tesseract, and whisper.
