version: 2

project_name: vidtrace

before:
  hooks:
    - go mod tidy

builds:
  - id: vidtrace
    main: ./cmd/vidtrace
    binary: vidtrace
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: vidtrace
    ids:
      - vidtrace
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md

nfpms:
  - id: vidtrace
    ids:
      - vidtrace
    package_name: vidtrace
    vendor: Abdul Hamid Achik
    homepage: "https://github.com/abdul-hamid-achik/vidtrace"
    maintainer: "Abdul Hamid Achik <abdulachik@icloud.com>"
    description: "Turn bug videos into timestamped evidence bundles for humans and coding agents"
    license: MIT
    formats:
      - deb
      - rpm
    bindir: /usr/bin
    section: utils
    # ffmpeg, ffprobe, tesseract, and whisper are runtime tools checked by
    # `vidtrace doctor`; they are not declared as hard package dependencies
    # because their package names differ across distributions and whisper is
    # installed via pip rather than a system package.

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

release:
  github:
    owner: abdul-hamid-achik
    name: vidtrace
  draft: false
  prerelease: auto
  name_template: "v{{ .Version }}"

homebrew_casks:
  - name: vidtrace
    ids:
      - vidtrace
    binaries:
      - vidtrace
    repository:
      owner: abdul-hamid-achik
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Casks
    homepage: "https://github.com/abdul-hamid-achik/vidtrace"
    description: "Turn bug videos into timestamped evidence bundles for humans and coding agents"
    license: "MIT"
    skip_upload: "{{ if .Env.HOMEBREW_TAP_TOKEN }}false{{ else }}true{{ end }}"
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/vidtrace"]
          end
    caveats: |
      The binary is not signed with an Apple Developer certificate.
      macOS may show a security warning on first run.

      If macOS blocks the first run, clear quarantine manually:
        xattr -dr com.apple.quarantine /opt/homebrew/Caskroom/vidtrace/*/vidtrace

      Run `vidtrace doctor` after installation to check ffmpeg, ffprobe, tesseract, and whisper.
